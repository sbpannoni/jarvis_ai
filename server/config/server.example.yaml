# Copy to server.yaml and edit. Secrets live in ~/.hermes/.env (NOT here).

llm:
  provider: hermes            # primary brain: Hermes Agent API. "anthropic" = basic fallback mode.
  model: claude-haiku-4-5     # used only by the fallback provider
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 220
  temperature: 0.3
  history_turns: 12           # fallback provider only

hermes:
  base_url: http://127.0.0.1:8642   # Hermes Agent API server (loopback)
  api_key_env: API_SERVER_KEY       # read from ~/.hermes/.env
  conversation: jarvis-main          # shared voice + HUD thread name
  session_key: jarvis:user:main      # stable long-term memory scope
  timeout: 240
  ack_after_seconds: 0               # >0 = speak a short ack while the agent works
  ack_texts: ["On it.", "Still working.", "Almost there."]
  fallback_provider: anthropic
  instructions: >
    You are speaking aloud through a voice pipeline. Replies are converted
    to speech, so use plain conversational prose only: no markdown, no lists,
    no code blocks. Default to one to three short sentences unless asked for
    more detail. Speak numbers, dates, times and phone numbers as natural
    spoken words. Never speak secrets, API keys, or passwords aloud.

stt:
  model: small.en           # LOCAL model (fallback if remote configured; primary otherwise)
  device: cpu
  compute_type: int8
  sample_rate: 16000
  partials: true            # live transcript while speaking
  partial_interval: 1.2     # seconds of new audio between partial passes
  # Optional GPU worker (worker/stt_server.py on any NVIDIA machine):
  # big-model accuracy at ~0.2s. Falls back to the local model automatically.
  # remote:
  #   name: gpu
  #   url: http://192.168.1.50:8768/stt
  #   token_env: JARVIS_HUD_TOKEN
  #   timeout: 6

rack_health:                 # custom glass-panel rack health, queried directly
                             # from Prometheus (not a Grafana iframe)
  prometheus_url: http://192.168.1.157:9090
  queries:
    snarf_gpu_temp_c: 'nvidia_smi_temperature_gpu{instance="192.168.1.239:9835"}'
    snarf_cpu_load1: 'node_load1{instance="192.168.1.239:9100"}'
    beelink_cpu_load1: 'node_load1{instance="192.168.1.158:9100"}'

machines:                   # polled by /api/machines for the HUD panel (optional)
  - name: "GPU WORKER"
    host: 192.168.1.50
    stats_url: http://192.168.1.50:8767/stats   # run worker/worker_stats.py there
    ping_port: 445

usage:
  # Your LLM provider's pricing ($ per 1M tokens) for HUD cost estimates. 0 = token counts only.
  llm_cost_per_mtok_input: 0
  llm_cost_per_mtok_output: 0

server:
  host: 0.0.0.0              # wildcard bind (required for non-root port 443 on macOS)
  port: 8765                 # plain ws:// for the Python push-to-talk client
  tls_ports: [443, 8766]     # https/wss for the HUD (browser mic requires TLS)
  tls_cert: certs/cert.pem
  tls_key: certs/key.pem
  dashboard_proxy:           # TLS reverse proxy so the HUD can iframe the Hermes dashboard
    port: 9443
    target: http://127.0.0.1:9119

security:
  hud_token_env: JARVIS_HUD_TOKEN   # set in ~/.hermes/.env; unset = auth disabled
  extra_origin_hosts: []            # e.g. ["192.168.1.10"] if you open the HUD by raw IP

voice:
  provider: elevenlabs
  model: eleven_flash_v2_5
  voice_name: "Your chosen voice"
  voice_id: YOUR_ELEVENLABS_VOICE_ID
  output_format: pcm_16000

persona:                     # used only by the anthropic fallback path
  system_prompt: >
    You are the spoken interface for the user's personal agent. Be direct,
    calm, and concise. Default to one to three short sentences.

activity_feed:               # Hermes session + rack-host reachability feed (/api/activity)
  poll_seconds: 30
  hosts:
    - {name: snarf, address: 100.115.80.50, port: 22}
    - {name: octominer, address: 100.104.84.79, port: 22}
    - {name: beelink, address: 192.168.1.158, port: 22}
    - {name: claude-control, address: 192.168.1.157, port: 22}
    - {name: hermes, address: 192.168.1.159, port: 22}
